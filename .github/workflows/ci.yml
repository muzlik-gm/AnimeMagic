name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─── Build + Test ────────────────────────────────────────────────────────
  build-test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'maven'
      - run: mvn -B -ntp clean verify
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: target/surefire-reports/*.xml
          if-no-files-found: ignore
          retention-days: 14
      - uses: actions/upload-artifact@v4
        with:
          name: AnimeMagic-jar
          path: target/AnimeMagic-*.jar
          if-no-files-found: error
          retention-days: 7

  # ─── Resource Pack ───────────────────────────────────────────────────────
  resource-pack:
    name: Resource Pack
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install --no-cache-dir Pillow
      - run: python3 scripts/generate_resource_pack.py
      - uses: actions/upload-artifact@v4
        with:
          name: AnimeMagicResourcePack
          path: resource_pack/build/AnimeMagicResourcePack.zip
          if-no-files-found: error
          retention-days: 7
      - run: |
          echo "=== Pack contents ==="
          unzip -l resource_pack/build/AnimeMagicResourcePack.zip | tail -5
          echo "=== pack.mcmeta ==="
          cat resource_pack/pack.mcmeta

  # ─── Publish "latest" release on every push to main ──────────────────────
  # Uploads JAR + resource pack DIRECTLY to a GitHub Release (raw files).
  # Download from the Releases page, NOT the Actions artifacts tab.
  publish-latest:
    name: Publish Latest Release
    needs: [build-test, resource-pack]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      # MUST checkout the repo — gh CLI requires a git context
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: AnimeMagic-jar
          path: release-files
      - uses: actions/download-artifact@v4
        with:
          name: AnimeMagicResourcePack
          path: release-files

      - name: Verify file types
        run: |
          cd release-files
          echo "=== Files to publish ==="
          ls -la
          file AnimeMagic-*.jar
          file AnimeMagicResourcePack.zip

      - name: Delete old "latest" release if exists
        run: |
          gh release delete latest --yes --cleanup-tag 2>/dev/null || echo "No previous latest release to delete"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create new "latest" release
        run: |
          gh release create latest \
            --title "AnimeMagic v1.0.0-alpha — Latest Build" \
            --notes "Automated build from commit ${{ github.sha }}

          ## Downloads

          - **AnimeMagic-*.jar** — The plugin JAR. Drop into your server's plugins folder.
          - **AnimeMagicResourcePack.zip** — Custom textures + 3D models. Host on a static URL and set gui.resource-pack-url in config.

          ## How to install

          1. Download the JAR and resource pack from THIS page (not the Actions tab)
          2. Drop the JAR into plugins/
          3. Upload the resource pack ZIP to any static file host
          4. Set gui.resource-pack-url in config.yml
          5. Restart server" \
            --target main \
            --prerelease \
            release-files/AnimeMagic-*.jar \
            release-files/AnimeMagicResourcePack.zip
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
