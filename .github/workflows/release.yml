name: Release

# Triggered when you push a tag like "v1.2.0" or "v2.0.0-rc1"
on:
  push:
    tags: ['v*']

permissions:
  contents: write    # Required to create the GitHub release

jobs:
  # ─── Build the release JAR + resource pack ──────────────────────────────
  build:
    name: Build Release Artifacts
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: ☕ Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'maven'

      - name: 🐍 Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 🎨 Install Pillow
        run: pip install --no-cache-dir Pillow

      - name: 🏷️ Extract version from tag
        id: version
        run: |
          # Strip leading 'v' from tag name
          VERSION="${GITHUB_REF_NAME#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Extracted version: $VERSION"

      - name: 🔨 Build JAR
        run: mvn -B -ntp clean package -DskipTests
        env:
          MAVEN_OPTS: "-Xmx2g"

      - name: ✅ Run tests (do not fail release if tests fail, just warn)
        run: mvn -B -ntp test || echo "::warning::Tests failed but proceeding with release"
        continue-on-error: true

      - name: 🖼️ Generate resource pack
        run: python3 scripts/generate_resource_pack.py

      - name: 📦 Stage release artifacts
        run: |
          mkdir -p staging
          cp target/AnimeMagic-*.jar staging/
          cp resource_pack/build/AnimeMagicResourcePack.zip staging/
          # Also copy the README and LICENSE
          cp README.md LICENSE staging/
          # Generate a changelog stub if it doesn't exist
          if [ ! -f CHANGELOG.md ]; then
            echo "# Changelog" > staging/CHANGELOG.md
            echo "" >> staging/CHANGELOG.md
            echo "## v${{ steps.version.outputs.version }}" >> staging/CHANGELOG.md
            echo "" >> staging/CHANGELOG.md
            echo "See https://github.com/${{ github.repository }}/releases/tag/${{ github.ref_name }}" >> staging/CHANGELOG.md
          else
            cp CHANGELOG.md staging/
          fi
          ls -la staging/

      - name: 📤 Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-jar
          path: staging/AnimeMagic-*.jar
          retention-days: 90

      - name: 📤 Upload resource pack artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-resource-pack
          path: staging/AnimeMagicResourcePack.zip
          retention-days: 90

  # ─── Publish the GitHub Release ─────────────────────────────────────────
  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: 📥 Download JAR artifact
        uses: actions/download-artifact@v4
        with:
          name: release-jar
          path: artifacts

      - name: 📥 Download resource pack artifact
        uses: actions/download-artifact@v4
        with:
          name: release-resource-pack
          path: artifacts

      - name: 📝 Generate release notes
        id: notes
        run: |
          cat > RELEASE_NOTES.md << 'EOF'
          # 🎉 AnimeMagic v${{ needs.build.outputs.version }}

          [Brief description here]

          ## 📦 Installation

          1. Download `AnimeMagic-${{ needs.build.outputs.version }}.jar`
          2. Drop into your Paper server's `plugins/` folder
          3. (Optional) Download `AnimeMagicResourcePack.zip` and host it on a static URL
          4. Set `gui.resource-pack-url` in `config.yml`
          5. Restart your server

          ## ✨ What's New

          - See [commits since last release](https://github.com/${{ github.repository }}/commits/${{ github.ref_name }})

          ## 📋 Requirements

          - Paper 1.17+ (1.20+ recommended for ItemDisplay 3D models)
          - Java 17+ (Java 21 recommended)

          ---
          *This release was automatically generated by GitHub Actions.*
          EOF

      - name: 🚀 Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: AnimeMagic v${{ needs.build.outputs.version }}
          body_path: RELEASE_NOTES.md
          files: |
            artifacts/AnimeMagic-*.jar
            artifacts/AnimeMagicResourcePack.zip
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          generate_release_notes: true
