# AnimeMagic global configuration

general:
  language: en
  debug: false
  disabled-worlds:
    - "spawn"
  global-cast-cooldown-ms: 250

mana:
  enabled: true
  base-max: 100
  regen-per-second: 2.0
  permission-bonus:
    "animemagic.mana.250": 150
    "animemagic.mana.500": 400
    "animemagic.mana.1000": 900
  show-bossbar: true
  bossbar-color: PURPLE
  bossbar-style: SEGMENTED_20

schools:
  naruto:
    enabled: true
    damage-multiplier: 1.0
    cooldown-multiplier: 1.0
  tensura:
    enabled: true
    damage-multiplier: 1.0
    cooldown-multiplier: 1.0
  mushoku:
    enabled: true
    require-chant: false
    damage-multiplier: 1.0
    cooldown-multiplier: 1.0
  onepiece:
    enabled: true
    damage-multiplier: 1.0
    cooldown-multiplier: 1.0

effects:
  max-per-player: 8
  particle-budget-per-tick: 4000
  render-distance: 64
  tick-interval: 1
  default-density: 32

gui:
  resource-pack-url: ""
  resource-pack-hash: ""
  force-resource-pack: false
  spellbook-rows: 6
  show-lore: true
  # Persistent action-bar HUD — shows the ability bound to the currently
  # selected hotbar slot, with mana cost, cooldown, and keybind hints.
  # Updates every `update-ticks` ticks (10 = 2 Hz). Set enabled: false to
  # disable entirely (e.g. if another plugin owns the action bar).
  actionbar:
    enabled: true
    update-ticks: 10
    # If false, slots with no binding show NO action bar (frees it for chat
    # or other plugins). If true, an "empty slot" prompt is shown.
    show-when-empty: false

arena:
  min-players: 2
  max-players: 8
  match-duration-seconds: 300
  sudden-death-seconds: 60
  reward-command: "eco give %player% 100"
  teleport-back: true

metrics:
  enabled: true
  plugin-id: 0

storage:
  type: yaml
  sqlite:
    file: "animemagic.db"
  mysql:
    host: localhost
    port: 3306
    database: animemagic
    username: root
    password: ""
  auto-save-seconds: 300

models:
  enabled: true
  max-per-player: 16
  default-lifetime-ticks: 200
  interpolation-duration: 2

animations:
  enabled: true
  tick-interval: 1

controls:
  hotbar:
    enabled: true
    show-equipped-message: true
  wheel:
    enabled: true
    auto-close-ticks: 100
  sneak:
    enabled: true
    target-range: 25.0
  combo:
    enabled: true
    window-ms: 1500
    max-length: 8
  castbar:
    interrupt-on-damage: true
    interrupt-on-sneak: true

# ---------------------------------------------------------------------
#  Cinematic Effects (v5 — impact frames, screen shake, destruction)
# ---------------------------------------------------------------------
cinematic:
  # Screen shake — rapidly offsets the player's view by tiny amounts for a
  # few ticks on big impacts. Simulates camera shake. Can cause motion
  # sickness for some players — disable if complaints.
  screen-shake:
    enabled: true
    # Maximum offset in blocks (0.05 = very subtle, 0.2 = violent)
    max-offset: 0.12
    # Duration in ticks (10 = 0.5 seconds)
    duration-ticks: 10
  # Impact frame — freezes the target + flashes + plays impact sound at the
  # moment of contact. Makes hits feel weighty.
  impact-frame:
    enabled: true
    # Duration of target freeze in ticks (5 = 0.25s)
    freeze-ticks: 5
  # Destruction — spells break blocks, form craters, leave scorch marks.
  # WARNING: This modifies terrain. Respect WorldGuard regions automatically.
  # Set max-blocks-per-spell to limit griefing potential.
  destruction:
    enabled: true
    # Max blocks a single spell can break
    max-blocks-per-spell: 30
    # Blocks that spells can NEVER break (even if destruction is enabled)
    unbreakable-blocks:
      - BEDROCK
      - BARRIER
      - SPAWNER
      - CHEST
      - ENDER_CHEST
      - SHULKER_BOX
      - COMMAND_BLOCK
      - STRUCTURE_BLOCK
      - NETHERITE_BLOCK
      - OBSIDIAN
    # Form craters on big impacts (replaces ground blocks with air + debris)
    craters: true
    # Leave scorch marks (fire + blackened blocks) after fire spells
    scorch-marks: true

config-version: 4
