help.header: "&d=== &eAnimeMagic Help &d==="
help.magic: |
  &e/magic reload &7- Reload config & messages
  &e/magic info &7- Show plugin info
  &e/magic give <player> <spell> &7- Force-teach a spell
  &e/magic version &7- Show version
help.spell: |
  &e/spell cast <id> &7- Cast a spell you know
  &e/spell learn <id> &7- Learn a spell
  &e/spell forget <id> &7- Forget a spell
  &e/spell list &7- List known spells
  &e/spell info <id> &7- Show spell details
help.arena: |
  &e/arena create <name> &7- Create an arena at your location
  &e/arena delete <name> &7- Delete an arena
  &e/arena join <name> &7- Join an arena queue
  &e/arena leave &7- Leave your queue
  &e/arena start <name> &7- Force-start an arena
  &e/arena stop <name> &7- Force-stop an arena
  &e/arena list &7- List arenas

