# ─────────────────────────────────────────────────────────────────────────────
# Action-bar HUD — persistent display of the currently selected ability.
# Placeholders:
#   %slot%      — hotbar slot number (1-9)
#   %cost%      — spell mana cost
#   %current%   — player's current mana
#   %max%       — player's max mana
#   %cost_color%— §b (blue) if affordable, §c (red) if not
#   %secs%      — cooldown seconds remaining
#   %sneak%     — display name of the sneak-variant spell
# ─────────────────────────────────────────────────────────────────────────────
actionbar.slot-marker: "&7❯ &8[&e%slot%&8] &r"
